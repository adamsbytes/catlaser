version: v2
inputs:
  - directory: proto
plugins:
  - protoc_builtin: python
    out: python/catlaser_brain/proto
  - protoc_builtin: pyi
    out: python/catlaser_brain/proto
  - remote: buf.build/apple/swift:v1.36.1
    out: app/ios/Sources/CatLaserProto/Generated
    opt:
      - Visibility=Public
      - FileNaming=PathToUnderscores
